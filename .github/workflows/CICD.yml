name: CICD sử dụng github actions

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: booking-app-main
  cancel-in-progress: true

jobs:
  ci:
    name: Kiểm tra chất lượng mã nguồn
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/my-app/package-lock.json

      - name: Cài dependencies backend
        run: npm ci
        working-directory: backend

      - name: Cài dependencies frontend
        run: npm ci
        working-directory: frontend/my-app

      - name: Lint frontend
        run: npm run lint
        working-directory: frontend/my-app

      - name: Build frontend
        run: npm run build
        working-directory: frontend/my-app

  build-and-push:
    name: Build và đẩy Docker images
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Đăng nhập vào dockerHub
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build và push backend image
        uses: docker/build-push-action@v7.0.0
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/booking-app-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/booking-app-backend:${{ github.sha }}

      - name: Build và push frontend image
        uses: docker/build-push-action@v7.0.0
        with:
          context: ./frontend/my-app
          file: ./frontend/my-app/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/booking-app-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/booking-app-frontend:${{ github.sha }}

